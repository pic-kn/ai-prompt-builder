name: Fetch definitions from Notion

on:
  schedule:
    - cron: '0 11 * * *'  # 毎日20:00 JST
  workflow_dispatch:  # 手動実行

jobs:
  fetch-definitions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}

      - name: Install requests
        run: pip install requests --quiet

      - name: Ensure latest main
        run: git pull origin main

      - name: Fetch definitions from Notion and update CLAUDE.md
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DEFINITION_DB_ID: ${{ secrets.NOTION_DEFINITION_DB_ID }}
        run: python3 scripts/fetch_definitions.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet CLAUDE.md; then
            git stash
            git pull origin main
            git stash pop
            git add CLAUDE.md
            git commit -m "chore: Notionから定義を自動更新"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "リトライ $i..."
              sleep 3
            done
          else
            echo "変更なし、スキップ"
          fi
