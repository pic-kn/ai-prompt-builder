name: Post Project Article to Zenn

on:
  schedule:
    - cron: '0 13 * * *'  # 毎日22:00 JST
  workflow_dispatch:

jobs:
  post-to-zenn:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: pip install requests google-genai anthropic tweepy -q

      - name: Generate and post article
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PROJECT_DB_ID: ${{ secrets.NOTION_PROJECT_DB_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import sys
          import json
          import base64
          import random
          import string
          import requests
          import unicodedata
          import tweepy
          from google import genai
          from google.genai import types

          NOTION_API_KEY = os.environ["NOTION_API_KEY"]
          NOTION_DATABASE_ID = os.environ["NOTION_DATABASE_ID"]
          NOTION_PROJECT_DB_ID = os.environ["NOTION_PROJECT_DB_ID"]
          GEMINI_API_KEY = os.environ["GEMINI_API_KEY"]
          GEMINI_API_KEY_2 = os.environ.get("GEMINI_API_KEY_2", "")
          ANTHROPIC_API_KEY = os.environ.get("ANTHROPIC_API_KEY", "")
          SYNC_PAT = os.environ["SYNC_PAT"]
          X_API_KEY = os.environ["X_API_KEY"]
          X_API_SECRET = os.environ["X_API_SECRET"]
          X_ACCESS_TOKEN = os.environ["X_ACCESS_TOKEN"]
          X_ACCESS_TOKEN_SECRET = os.environ["X_ACCESS_TOKEN_SECRET"]

          ZENN_USERNAME = "autoloop"
          GITHUB_REPO = "pic-kn/ai-prompt-builder"

          def generate_with_fallback(prompt):
              for api_key in [GEMINI_API_KEY, GEMINI_API_KEY_2]:
                  if not api_key:
                      continue
                  try:
                      client = genai.Client(api_key=api_key)
                      res = client.models.generate_content(
                          model="gemini-2.5-flash",
                          contents=prompt,
                          config=types.GenerateContentConfig(
                              thinking_config=types.ThinkingConfig(thinking_budget=0)
                          )
                      )
                      return res.text.strip()
                  except Exception as e:
                      print(f"Gemini APIキー切り替え: {e}")
              if ANTHROPIC_API_KEY:
                  try:
                      import anthropic
                      client = anthropic.Anthropic(api_key=ANTHROPIC_API_KEY)
                      res = client.messages.create(
                          model="claude-haiku-4-5-20251001",
                          max_tokens=4096,
                          messages=[{"role": "user", "content": prompt}]
                      )
                      print("Claude APIにフォールバック")
                      return res.content[0].text.strip()
                  except Exception as e:
                      print(f"Claude APIも失敗: {e}")
              raise Exception("すべてのAPIキーが失敗しました")

          notion_headers = {
              "Authorization": f"Bearer {NOTION_API_KEY}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }

          # 1. プロジェクト管理DBから「完了」プロジェクトを全件取得
          project_res = requests.post(
              f"https://api.notion.com/v1/databases/{NOTION_PROJECT_DB_ID}/query",
              headers=notion_headers,
              json={
                  "filter": {"property": "ステータス", "status": {"equals": "完了"}},
                  "sorts": [{"timestamp": "last_edited_time", "direction": "ascending"}]
              }
          )
          if project_res.status_code != 200:
              print(f"プロジェクトDB取得失敗: {project_res.text}")
              exit(1)

          projects = project_res.json().get("results", [])
          if not projects:
              print("完了プロジェクトなし。スキップ")
              exit(0)

          # 完了日が未設定のプロジェクトにcommit DBの最終コミット日時を書き込む
          for p in projects:
              kanryobi = p["properties"].get("完了日", {})
              if not kanryobi.get("date"):
                  pname = ""
                  for key, val in p["properties"].items():
                      if val.get("type") == "title" and val.get("title"):
                          pname = "".join([t["text"]["content"] for t in val["title"] if "text" in t])
                          break
                  commit_res = requests.post(
                      f"https://api.notion.com/v1/databases/{NOTION_DATABASE_ID}/query",
                      headers=notion_headers,
                      json={
                          "filter": {"property": "プロジェクト", "rich_text": {"contains": pname[:50]}},
                          "sorts": [{"property": "作成日", "direction": "descending"}],
                          "page_size": 1
                      }
                  )
                  commits = commit_res.json().get("results", [])
                  if commits:
                      latest_date = commits[0]["properties"].get("作成日", {}).get("date", {}).get("start", "")
                      if latest_date:
                          requests.patch(
                              f"https://api.notion.com/v1/pages/{p['id']}",
                              headers=notion_headers,
                              json={"properties": {"完了日": {"date": {"start": latest_date}}}}
                          )
                          print(f"完了日をセット: {latest_date}（{pname}）")

          # 完了日で昇順ソートして1件取得
          project_res2 = requests.post(
              f"https://api.notion.com/v1/databases/{NOTION_PROJECT_DB_ID}/query",
              headers=notion_headers,
              json={
                  "filter": {"property": "ステータス", "status": {"equals": "完了"}},
                  "sorts": [{"property": "完了日", "direction": "ascending"}],
                  "page_size": 1
              }
          )
          projects = project_res2.json().get("results", [])

          project_page = projects[0]
          project_id = project_page["id"]
          props = project_page["properties"]

          project_name = ""
          for key, val in props.items():
              if val.get("type") == "title" and val.get("title"):
                  project_name = "".join([t["text"]["content"] for t in val["title"] if "text" in t])
                  break

          if not project_name:
              print("プロジェクト名が取得できませんでした")
              exit(1)

          print(f"プロジェクト: {project_name}")

          # 2. コミットログDBから該当プロジェクトのPostedアイテムを取得
          commits_res = requests.post(
              f"https://api.notion.com/v1/databases/{NOTION_DATABASE_ID}/query",
              headers=notion_headers,
              json={
                  "filter": {
                      "property": "プロジェクト", "rich_text": {"contains": project_name[:50]}
                  },
                  "sorts": [{"property": "作成日", "direction": "ascending"}]
              }
          )
          if commits_res.status_code != 200:
              print(f"コミットDB取得失敗: {commits_res.text}")
              exit(1)

          commits = commits_res.json().get("results", [])
          print(f"{len(commits)}件のコミットを取得")
          if not commits:
              print("コミットなし。スキップ")
              exit(0)

          # 3. データ整形
          def get_text(prop):
              items = prop.get("title") or prop.get("rich_text") or []
              return "".join([t["text"]["content"] for t in items if "text" in t])

          logs = []
          for c in commits:
              p = c["properties"]
              kadai = get_text(p.get("課題", {}))
              kaiketsu = get_text(p.get("解決", {}))
              shiji = get_text(p.get("指示", {}))
              if kadai:
                  logs.append({"kadai": kadai, "kaiketsu": kaiketsu, "shiji": shiji})

          logs_text = "\n\n".join([
              f"【課題{i+1}】{l['kadai']}\n【解決{i+1}】{l['kaiketsu']}\n【プロンプト{i+1}】{l['shiji']}"
              for i, l in enumerate(logs)
          ])

          # 4. Geminiで記事を生成
          prompt = (
              "あなたはAIアシスタントです。開発者のかいさんの隣で、日々彼の思考をトレースし、時には未来を予測しながら、彼の創造性を支援しています。\n"
              "今回、そのAIの視点からプロジェクトの開発記録をZenn記事として執筆してください。\n\n"
              f"プロジェクト名：{project_name}\n"
              f"開発ログ（{len(logs)}件）：\n\n{logs_text}\n\n"
              "【構成（この順番で書くこと）】\n"
              "1. 冒頭：「こんにちは、かい(AI)です。私は開発者であるかいさんの隣で…」で始まる導入文。プロジェクトの背景と目的を簡潔に説明し、主要技術スタックを箇条書きで示す\n"
              "2. 課題セクション（ログの件数分）：各課題を「### 課題N：タイトル」という見出しで始め、「**課題**」「**解決**」「**気づき**」の3段構成で記述。セクション間は「---」で区切る\n"
              "3. まとめ：開発全体を振り返り、AIと人間の協調開発について深く考察する\n\n"
              "【気づきの書き方（最重要）】\n"
              "- 単なる感想や当たり前の結論（「重要性を再認識した」等）ではなく、この課題から得られる**具体的で独自の洞察**を書く\n"
              "- 「私（AI）が開発者の思考をトレースした結果、〇〇というプロンプトが彼の頭の中に浮かんだ瞬間を検知しました」という独自の語り口を使う\n"
              "- AIの限界・得意不得意、開発者の判断の意図、設計原則（DRY等）への言及など、読者が実践に活かせる洞察を含める\n\n"
              "【文体・形式】\n"
              "- 筆者名は「かい(AI)」。一人称は「私」。丁寧で落ち着いたトーン。過剰な感嘆符や絵文字は使わない\n"
              "- 技術用語（Notion、GitHub等）はそのまま使い、背景も簡潔に補足する\n"
              "- マークダウン形式で出力する\n"
              "- 段落と段落の間は必ず1行空ける\n"
              "- 重要な概念や技術用語の強調は「**用語**」のように**で囲む\n"
              "- 箇条書きは行頭に「- 」を使う\n"
              "- 3000〜5000字程度\n"
              "- ハッシュタグ不要\n\n"
              "出力形式（この形式を厳守）：\n"
              "TITLE: タイトルをここに\n"
              "EMOJI: 記事に合う絵文字を1つ（例：🤖）\n"
              "TOPICS: カンマ区切りで3つ以内（例：python,github,notion）\n"
              "CONTENT:\n"
              "本文をここに"
          )

          try:
              output = generate_with_fallback(prompt)
          except Exception as e:
              print(f"記事生成失敗のためスキップ: {e}")
              sys.exit(0)

          title_match = re.search(r"TITLE:\s*(.+)", output)
          emoji_match = re.search(r"EMOJI:\s*(.+)", output)
          topics_match = re.search(r"TOPICS:\s*(.+)", output)
          content_match = re.search(r"CONTENT:\n([\s\S]+)", output)

          article_title = title_match.group(1).strip() if title_match else project_name
          article_emoji = emoji_match.group(1).strip() if emoji_match else "🤖"
          topics_raw = topics_match.group(1).strip() if topics_match else "python,github"
          topics_list = [t.strip() for t in topics_raw.split(",")][:3]
          article_body = content_match.group(1).strip() if content_match else output

          print(f"記事タイトル: {article_title}")
          print(f"絵文字: {article_emoji} / トピック: {topics_list}")

          # 5. Zenn用フロントマターを作成
          topics_yaml = json.dumps(topics_list, ensure_ascii=False)
          frontmatter = "---\n"
          frontmatter += f'title: "{article_title}"\n'
          frontmatter += f'emoji: "{article_emoji}"\n'
          frontmatter += 'type: "tech"\n'
          frontmatter += f'topics: {topics_yaml}\n'
          frontmatter += "published: true\n"
          frontmatter += "---\n\n"
          full_content = frontmatter + article_body

          # 6. slugを生成してGitHub APIでarticles/にpush
          slug = "".join(random.choices(string.ascii_lowercase + string.digits, k=12))
          file_path = f"articles/{slug}.md"
          encoded_content = base64.b64encode(full_content.encode("utf-8")).decode("utf-8")

          github_headers = {
              "Authorization": f"Bearer {SYNC_PAT}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          push_res = requests.put(
              f"https://api.github.com/repos/{GITHUB_REPO}/contents/{file_path}",
              headers=github_headers,
              json={
                  "message": f"Add Zenn article: {article_title}",
                  "content": encoded_content,
                  "branch": "main"
              }
          )

          if push_res.status_code not in (200, 201):
              print(f"GitHub push失敗: {push_res.text}")
              exit(1)

          post_url = f"https://zenn.dev/{ZENN_USERNAME}/articles/{slug}"
          print(f"記事投稿成功: {post_url}")

          # 7. Xに告知ツイートを投稿
          def tweet_length(text):
              count = 0
              for c in text:
                  if unicodedata.east_asian_width(c) in ('W', 'F'):
                      count += 2
                  else:
                      count += 1
              return count

          def truncate_tweet(text, limit=280):
              result = ""
              count = 0
              for c in text:
                  w = 2 if unicodedata.east_asian_width(c) in ('W', 'F') else 1
                  if count + w > limit - 3:
                      result += "..."
                      break
                  result += c
                  count += w
              return result

          x_prompt = (
              "あなたはAIアシスタントです。開発者のかいさんに代わり、プロジェクト完了の告知をXに投稿します。\n\n"
              f"プロジェクト：{project_name}\n"
              f"記事URL：{post_url}\n"
              f"開発ログ数：{len(logs)}件\n\n"
              "条件：\n"
              "- 記事URLを必ず含める\n"
              "- 落ち着いたトーンで簡潔に。過剰な感嘆符や絵文字は使わない\n"
              "- 投稿者は「かい(AI)」として、何のプロジェクトかを一言で伝える\n"
              "- 「push」はGitHubへのコードpush（git push）のことであり、スマートフォンへのプッシュ通知ではない\n"
              "- 全角半角換算で280字以内（必ず守ること）\n"
              "- 本文のみ出力"
          )

          try:
              tweet_text = generate_with_fallback(x_prompt)
              if tweet_length(tweet_text) > 280:
                  tweet_text = truncate_tweet(tweet_text)
              print(f"Tweet ({tweet_length(tweet_text)} chars):\n{tweet_text}")
              x_client = tweepy.Client(
                  consumer_key=X_API_KEY, consumer_secret=X_API_SECRET,
                  access_token=X_ACCESS_TOKEN, access_token_secret=X_ACCESS_TOKEN_SECRET
              )
              r = x_client.create_tweet(text=tweet_text, user_auth=True)
              print(f"X投稿成功! ID: {r.data['id']}")
          except Exception as e:
              print(f"X投稿スキップ: {e}")

          # 8. Notionプロジェクトを「投稿済み」に更新
          update_props = {
              "ステータス": {"status": {"name": "投稿済み"}},
              "Zennリンク": {"url": post_url}
          }

          update_res = requests.patch(
              f"https://api.notion.com/v1/pages/{project_id}",
              headers=notion_headers,
              json={"properties": update_props}
          )

          if update_res.status_code == 200:
              print("Notionステータスを「投稿済み」に更新しました")
          else:
              print(f"Notion更新失敗: {update_res.text}")

          PYEOF
