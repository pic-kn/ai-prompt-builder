name: Post to X (Daily 20:00 JST)

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  post-to-x:
    runs-on: ubuntu-latest

    steps:
      - name: Post Notion Ready items to X
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install requests tweepy google-genai -q

          python3 << 'PYEOF'
          import os
          import unicodedata
          import requests
          import tweepy
          from google import genai
          from google.genai import types

          NOTION_API_KEY = os.environ["NOTION_API_KEY"]
          NOTION_DATABASE_ID = os.environ["NOTION_DATABASE_ID"]
          X_API_KEY = os.environ["X_API_KEY"]
          X_API_SECRET = os.environ["X_API_SECRET"]
          X_ACCESS_TOKEN = os.environ["X_ACCESS_TOKEN"]
          X_ACCESS_TOKEN_SECRET = os.environ["X_ACCESS_TOKEN_SECRET"]
          GEMINI_API_KEY = os.environ["GEMINI_API_KEY"]

          def tweet_length(text):
              count = 0
              for c in text:
                  if unicodedata.east_asian_width(c) in ('W', 'F'):
                      count += 2
                  else:
                      count += 1
              return count

          def truncate_tweet(text, limit=280):
              result = ""
              count = 0
              for c in text:
                  w = 2 if unicodedata.east_asian_width(c) in ('W', 'F') else 1
                  if count + w > limit - 3:
                      result += "..."
                      break
                  result += c
                  count += w
              return result

          notion_headers = {
              "Authorization": f"Bearer {NOTION_API_KEY}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }

          # Posted件数を取得して連番を決める
          count_res = requests.post(
              f"https://api.notion.com/v1/databases/{NOTION_DATABASE_ID}/query",
              headers=notion_headers,
              json={"filter": {"property": "Status", "select": {"equals": "Posted"}}}
          )
          posted_count = len(count_res.json().get("results", []))
          number = posted_count + 1
          print(f"\u9023番: #{number}")

          # Readyのページを取得
          res = requests.post(
              f"https://api.notion.com/v1/databases/{NOTION_DATABASE_ID}/query",
              headers=notion_headers,
              json={"filter": {"property": "Status", "select": {"equals": "Ready"}}}
          )
          data = res.json()

          if res.status_code != 200:
              print(f"Notion query error: {data}")
              exit(1)

          pages = data.get("results", [])
          print(f"Found {len(pages)} Ready items")

          if not pages:
              print("No Ready items found. Skipping.")
              exit(0)

          page = pages[0]
          page_id = page["id"]
          props = page["properties"]

          def get_text(prop):
              items = prop.get("title") or prop.get("rich_text") or []
              return "".join([t["text"]["content"] for t in items if "text" in t])

          kadai = get_text(props.get("\u8ab2\u984c", {}))
          kaiketsu = get_text(props.get("\u89e3\u6c7a", {}))
          shiji = get_text(props.get("\u6307\u793a", {}))
          tejigyo = get_text(props.get("\u624b\u4f5c\u696d", {}))

          print(f"\u8ab2\u984c: {kadai}")
          print(f"\u89e3\u6c7a: {kaiketsu}")
          print(f"\u6307\u793a: {shiji}")
          print(f"\u624b\u4f5c\u696d: {tejigyo}")

          gemini_client = genai.Client(api_key=GEMINI_API_KEY)

          prompt = (
              f"\u3042なたはGeminiです。開発者のかいさんの代わりに、AIとして開発進捗を投稿します。\n\n"
              f"\u4ee5下の内容を元に、「かい(Gemini)です。」というスタンスで、AIが主語となって語る投稿文を作ってください。\n\n"
              "\u6761\u4ef6\uff1a\n"
              "- 1\u884c\u76ee\uff1a『【\u500b\u4eba\u958b\u767a\u30ed\u30b0 #』』 + 連番 + 『』の形式\n"
              f"- 2\u884c\u76ee\uff1a『かい(Gemini)です。』固定\n"
              "- 『今日は』から始まる1文で何をしたかを自然な口語調で\n"
              "- 課題を誤解なく伝わる平易な言葉で説明\n"
              "- 解決に至った結論を定型文で簡潔に\n"
              "- 過剰な感嘆符や絵文字は使わない\n"
              "- 日本語140字以内\n"
              "- ハッシュタグは含めない\n\n"
              f"\u9023番: {number}\n"
              f"\u8ab2\u984c: {kadai}\n"
              f"\u89e3\u6c7a: {kaiketsu}\n\n"
              "\u6295\u7a3f\u6587\u672c\u306e\u307f\u51fa\u529b\u3057\u3066\u304f\u3060\u3055\u3044\u3002"
          )

          response = gemini_client.models.generate_content(
              model="gemini-2.5-flash",
              contents=prompt,
              config=types.GenerateContentConfig(thinking_config=types.ThinkingConfig(thinking_budget=0))
          )
          tweet1 = truncate_tweet(response.text.strip())

          # Tweet2: プロンプトと手作業をそのまま表示
          tweet2_lines = [f"かいさんからもらったプロンプト↓\n\n「{shiji}」"]
          if tejigyo and tejigyo != "なし":
              tweet2_lines.append(f"\n\nかいさんが手動でやったこと↓\n\n{tejigyo}")
          tweet2 = truncate_tweet("".join(tweet2_lines))

          print(f"Tweet1 ({tweet_length(tweet1)} weighted chars):\n{tweet1}")
          print(f"Tweet2 ({tweet_length(tweet2)} weighted chars):\n{tweet2}")

          x_client = tweepy.Client(
              consumer_key=X_API_KEY,
              consumer_secret=X_API_SECRET,
              access_token=X_ACCESS_TOKEN,
              access_token_secret=X_ACCESS_TOKEN_SECRET
          )

          try:
              res1 = x_client.create_tweet(text=tweet1, user_auth=True)
              tweet1_id = res1.data["id"]
              print(f"Tweet1 posted! ID: {tweet1_id}")

              if tweet2:
                  res2 = x_client.create_tweet(
                      text=tweet2,
                      in_reply_to_tweet_id=tweet1_id,
                      user_auth=True
                  )
                  print(f"Tweet2 (reply) posted! ID: {res2.data['id']}")

          except tweepy.TweepyException as e:
              print(f"Failed to post to X: {e}")
              exit(1)

          update_url = f"https://api.notion.com/v1/pages/{page_id}"
          update_payload = {
              "properties": {
                  "Status": {"select": {"name": "Posted"}}
              }
          }
          update_res = requests.patch(update_url, headers=notion_headers, json=update_payload)

          if update_res.status_code == 200:
              print("Successfully posted to X and updated Notion to Posted!")
          else:
              print(f"Notion update failed: {update_res.text}")
              exit(1)

          PYEOF
