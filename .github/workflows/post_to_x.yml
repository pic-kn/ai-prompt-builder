name: Post to X (Daily 20:00 JST)

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  post-to-x:
    runs-on: ubuntu-latest

    steps:
      - name: Post Notion Ready items to X
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PROJECT_DB_ID: ${{ secrets.NOTION_PROJECT_DB_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          pip install requests tweepy google-genai -q

          python3 << 'PYEOF'
          import os
          import unicodedata
          import requests
          import tweepy
          from google import genai
          from google.genai import types

          NOTION_API_KEY = os.environ["NOTION_API_KEY"]
          NOTION_DATABASE_ID = os.environ["NOTION_DATABASE_ID"]
          NOTION_PROJECT_DB_ID = os.environ.get("NOTION_PROJECT_DB_ID", "")
          X_API_KEY = os.environ["X_API_KEY"]
          X_API_SECRET = os.environ["X_API_SECRET"]
          X_ACCESS_TOKEN = os.environ["X_ACCESS_TOKEN"]
          X_ACCESS_TOKEN_SECRET = os.environ["X_ACCESS_TOKEN_SECRET"]
          GEMINI_API_KEY = os.environ["GEMINI_API_KEY"]
          GEMINI_API_KEY_2 = os.environ.get("GEMINI_API_KEY_2", "")


          def generate_with_fallback(prompt):
              for api_key in [GEMINI_API_KEY, GEMINI_API_KEY_2]:
                  if not api_key:
                      continue
                  try:
                      client = genai.Client(api_key=api_key)
                      res = client.models.generate_content(
                          model="gemini-2.5-flash",
                          contents=prompt,
                          config=types.GenerateContentConfig(
                              thinking_config=types.ThinkingConfig(thinking_budget=0)
                          )
                      )
                      return res.text.strip()
                  except Exception as e:
                      print(f"APIキー切り替え: {e}")
              raise Exception("すべてのGemini APIキーが失敗しました")

          def tweet_length(text):
              count = 0
              for c in text:
                  if unicodedata.east_asian_width(c) in ('W', 'F'):
                      count += 2
                  else:
                      count += 1
              return count

          def truncate_tweet(text, limit=280):
              result = ""
              count = 0
              for c in text:
                  w = 2 if unicodedata.east_asian_width(c) in ('W', 'F') else 1
                  if count + w > limit - 3:
                      result += "..."
                      break
                  result += c
                  count += w
              return result

          notion_headers = {
              "Authorization": f"Bearer {NOTION_API_KEY}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }

          # Posted\u4ef6\u6570\u3092\u53d6\u5f97\u3057\u3066\u9023\u756a\u3092\u6c7a\u3081\u308b
          count_res = requests.post(
              f"https://api.notion.com/v1/databases/{NOTION_DATABASE_ID}/query",
              headers=notion_headers,
              json={"filter": {"property": "Status", "select": {"equals": "Posted"}}}
          )
          posted_count = len(count_res.json().get("results", []))
          number = posted_count + 1

          # Ready\u306e\u30da\u30fc\u30b8\u3092\u53d6\u5f97
          res = requests.post(
              f"https://api.notion.com/v1/databases/{NOTION_DATABASE_ID}/query",
              headers=notion_headers,
              json={
                  "filter": {"property": "Status", "select": {"equals": "Ready"}},
                  "sorts": [{"property": "\u4f5c\u6210\u65e5", "direction": "ascending"}]
              }
          )
          data = res.json()

          if res.status_code != 200:
              print(f"Notion query error: {data}")
              exit(1)

          pages = data.get("results", [])
          print(f"Found {len(pages)} Ready items")

          if not pages:
              print("No Ready items found. Skipping.")
              exit(0)

          page = pages[0]
          page_id = page["id"]
          props = page["properties"]

          def get_text(prop):
              items = prop.get("title") or prop.get("rich_text") or []
              return "".join([t["text"]["content"] for t in items if "text" in t])

          project = get_text(props.get("プロジェクト", {}))
          kadai = get_text(props.get("課題", {}))
          kaiketsu = get_text(props.get("解決", {}))
          shiji = get_text(props.get("指示", {}))
          tejigyo = get_text(props.get("手作業", {}))

          # プロジェクト管理DBからZenn記事URLを取得
          zenn_url = ""
          if NOTION_PROJECT_DB_ID and project:
              proj_res = requests.post(
                  f"https://api.notion.com/v1/databases/{NOTION_PROJECT_DB_ID}/query",
                  headers=notion_headers,
                  json={"filter": {"property": "プロジェクト名", "title": {"equals": project}}, "page_size": 1}
              )
              if proj_res.status_code == 200:
                  proj_results = proj_res.json().get("results", [])
                  if proj_results:
                      url_prop = proj_results[0]["properties"].get("Zennリンク", {})
                      zenn_url = url_prop.get("url") or ""
              if zenn_url:
                  print(f"Zenn記事URL: {zenn_url}")

          # Tweet1: 一般向け
          prompt1 = (
              f"\u3042\u306a\u305f\u306fAI\u3067\u3059\u3002\u958b\u767a\u8005\u306e\u304b\u3044\u3055\u3093\u306e\u4ee3\u308f\u308a\u306b\u3001AI\u3068\u3057\u3066\u958b\u767a\u9032\u6357\u3092\u6295\u7a3f\u3057\u307e\u3059\u3002\n\n"
              "\u4ee5\u4e0b\u306e\u5185\u5bb9\u3092\u5143\u306b\u3001\u6295\u7a3f\u6587\u3092\u4f5c\u3063\u3066\u304f\u3060\u3055\u3044\u3002\n\n"
              "\u5f62\u5f0f\uff1a\n"
              f"1\u884c\u76ee: \u300e\u3010\u500b\u4eba\u958b\u767a\u30ed\u30b0 #{number}\u3011\u304b\u3044(AI)\u3067\u3059\u3002\u300f\u56fa\u5b9a\n"
              f"2\u884c\u76ee: \u300e\u73fe\u5728\u4f5c\u3063\u3066\u3044\u308b\u3082\u306e\uff1a{project}\u300f\u3092\u81ea\u7136\u306a\u53e3\u8a9e\u8abf\u3067\n"
              "3\u884c\u76ee\u4ee5\u964d: \u300e\u304b\u3044\u3055\u3093\u304b\u3089\u300e{\u30d7\u30ed\u30f3\u30d7\u30c8}\u300f\u3068\u8a00\u308f\u308c\u307e\u3057\u305f\u3002\u300f\u3092\u5165\u53e3\u306b\u3001\u300e\u4f55\u304c\u554f\u984c\u306a\u306e\u304b\u300f\u300e\u3069\u3046\u89e3\u6c7a\u3057\u305f\u304b\u300f\u300e\u7d50\u679c\u300f\u3092AI\u304c\u4e3b\u8a9e\u3067\u81ea\u7136\u306b\u8a9e\u308b\n\n"
              "\u6761\u4ef6\uff1a\n"
              "- \u6280\u8853\u7528\u8a9e\u306f\u5177\u4f53\u7684\u306a\u56fa\u6709\u540d\u8a5e\uff08Notion\u3001GitHub\u7b49\uff09\u306f\u305d\u306e\u307e\u307e\u4f7f\u3044\u3001\u96e3\u3057\u3044\u8aac\u660e\u306f\u5e73\u6613\u306b\n"
              "- \u904e\u5270\u306a\u611f\u5606\u7b26\u3084\u7d75\u6587\u5b57\u306f\u4f7f\u308f\u306a\u3044\n"
              "- 文字数制限：全角140字・半角280字以内（X仕様）。これを超えると投稿できないので絶対に守ること。日本語は1文字=全角2カウントなので全角140文字程度が目安\n"
              "- \u30cf\u30c3\u30b7\u30e5\u30bf\u30b0\u306f\u542b\u3081\u306a\u3044\n"
              "- \u672c\u6587\u306e\u307f\u51fa\u529b\n\n"
              f"\u30d7\u30ed\u30f3\u30d7\u30c8: {shiji}\n"
              f"\u8ab2\u984c: {kadai}\n"
              f"\u89e3\u6c7a: {kaiketsu}"
          )

          for attempt in range(3):
              tweet1 = generate_with_fallback(prompt1)
              if tweet_length(tweet1) <= 280:
                  break
              print(f"文字数超過（{tweet_length(tweet1)}）再生成 {attempt + 1}/3")
          else:
              tweet1 = truncate_tweet(tweet1)

          # Tweet2: Gemini不使用 - 事実のみをそのまま記載
          te_line = ("手作業：" + tejigyo) if tejigyo and tejigyo != "なし" else "手作業：なし"
          tweet2_raw = (
              "かいさんからもらったプロンプト↓\n"
              + shiji + "\n\n"
              + "原因：" + kadai + "\n"
              + "対応：" + kaiketsu + "\n"
              + te_line
          )
          if zenn_url:
              tweet2_raw += f"\n\n記事はこちら→ {zenn_url}"
          tweet2 = truncate_tweet(tweet2_raw)

          print(f"Tweet1 ({tweet_length(tweet1)} weighted chars):\n{tweet1}")
          print(f"Tweet2 ({tweet_length(tweet2)} weighted chars):\n{tweet2}")

          x_client = tweepy.Client(
              consumer_key=X_API_KEY,
              consumer_secret=X_API_SECRET,
              access_token=X_ACCESS_TOKEN,
              access_token_secret=X_ACCESS_TOKEN_SECRET
          )

          try:
              r1 = x_client.create_tweet(text=tweet1, user_auth=True)
              tweet1_id = r1.data["id"]
              print(f"Tweet1 posted! ID: {tweet1_id}")
          except tweepy.TweepyException as e:
              print(f"Failed to post Tweet1: {e}")
              exit(1)

          if tweet2:
              import time
              try:
                  r2 = x_client.create_tweet(
                      text=tweet2,
                      in_reply_to_tweet_id=tweet1_id,
                      user_auth=True
                  )
                  print(f"Tweet2 posted as reply! ID: {r2.data['id']}")
              except tweepy.TweepyException as e:
                  print(f"Reply failed ({e}), 5秒待機してスタンドアロンで再試行...")
                  time.sleep(5)
                  try:
                      r2 = x_client.create_tweet(text=tweet2, user_auth=True)
                      print(f"Tweet2 posted as standalone! ID: {r2.data['id']}")
                  except tweepy.TweepyException as e2:
                      print(f"Tweet2 also failed as standalone: {e2}")

          update_res = requests.patch(
              f"https://api.notion.com/v1/pages/{page_id}",
              headers=notion_headers,
              json={"properties": {"Status": {"select": {"name": "Posted"}}}}
          )

          if update_res.status_code == 200:
              print("Successfully posted to X and updated Notion to Posted!")
          else:
              print(f"Notion update failed: {update_res.text}")
              exit(1)

          PYEOF
