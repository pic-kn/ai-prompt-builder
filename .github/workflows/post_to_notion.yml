name: Post Commit to Notion

on:
  push:
    branches:
      - main

jobs:
  post-to-notion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract and post to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          REPO_NAME: ${{ github.repository }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message:"
          echo "$COMMIT_MSG"

          KADAI=$(echo "$COMMIT_MSG" | grep -oP '(?<=\u3010\u8ab2\u984c\u3011)[^\n\u3010]*' | head -1 | xargs)
          KAIKETSU=$(echo "$COMMIT_MSG" | grep -oP '(?<=\u3010\u89e3\u6c7a\u3011)[^\n\u3010]*' | head -1 | xargs)
          SHIJI=$(echo "$COMMIT_MSG" | grep -oP '(?<=\u3010\u6307\u793a\u3011)[^\n\u3010]*' | head -1 | xargs)
          TEJIGYO=$(echo "$COMMIT_MSG" | grep -oP '(?<=\u3010\u624b\u4f5c\u696d\u3011)[^\n\u3010]*' | head -1 | xargs)

          echo "\u8ab2\u984c: $KADAI"
          echo "\u89e3\u6c7a: $KAIKETSU"
          echo "\u6307\u793a: $SHIJI"
          echo "\u624b\u4f5c\u696d: $TEJIGYO"
          echo "\u30ea\u30dd\u30b8\u30c8\u30ea: $REPO_NAME"

          if [ -z "$KADAI" ] || [ -z "$KAIKETSU" ] || [ -z "$SHIJI" ]; then
            echo "Required fields not found in commit message. Skipping Notion post."
            exit 0
          fi

          if [ -z "$TEJIGYO" ]; then
            TEJIGYO="\u306a\u3057"
          fi

          PAYLOAD=$(jq -n \
            --arg db "$NOTION_DATABASE_ID" \
            --arg kadai "$KADAI" \
            --arg kaiketsu "$KAIKETSU" \
            --arg shiji "$SHIJI" \
            --arg tejigyo "$TEJIGYO" \
            --arg repo "$REPO_NAME" \
            '{
              "parent": { "database_id": $db },
              "properties": {
                "\u8ab2\u984c": {
                  "title": [{ "text": { "content": $kadai } }]
                },
                "\u89e3\u6c7a": {
                  "rich_text": [{ "text": { "content": $kaiketsu } }]
                },
                "\u6307\u793a": {
                  "rich_text": [{ "text": { "content": $shiji } }]
                },
                "\u624b\u4f5c\u696d": {
                  "rich_text": [{ "text": { "content": $tejigyo } }]
                },
                "\u30ea\u30dd\u30b8\u30c8\u30ea": {
                  "rich_text": [{ "text": { "content": $repo } }]
                },
                "Status": {
                  "select": { "name": "Ready" }
                }
              }
            }')

          echo "Sending payload to Notion..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "$PAYLOAD")

          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $HTTP_BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error: Notion API returned status $HTTP_CODE"
            exit 1
          fi

          echo "Successfully posted to Notion!"
