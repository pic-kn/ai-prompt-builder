name: Fix Notion Data

# Claudeが変数を書き換えてpushすると自動実行される
# 手動実行時はRun workflowから"execute"を入力して実行
# 最終更新: 2026-03-29 (DATE_AFTERなしで再実行)
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix_notion_data.yml'
  workflow_dispatch:
    inputs:
      confirm:
        description: |
          【実行内容を確認してください】
          MODE     : update
          DATABASE : commit_log
          FILTER   : Status = "Posted"
          UPDATE   : Status → "Ready"
          LIMIT    : 1件（最新）
          ※ 確認したら "execute" と入力して実行
        required: true
        type: string

env:
  # ========== ここをClaudeが書き換える ==========
  MODE: "update"             # update / create
  DATABASE: "project"        # commit_log / project

  # updateモード用
  FILTER_PROPERTY: "ステータス"
  FILTER_VALUE: "完了"
  FILTER_TYPE: "status"      # rich_text / select / status / date
  # 日付フィルター（作成日での絞り込み。不要な場合は空に）
  DATE_PROPERTY: ""
  DATE_AFTER: ""             # この日時以降（不要なら空）
  DATE_BEFORE: ""            # この日時以前（不要なら空）
  LIMIT: ""                  # 更新件数の上限（空なら全件）
  SORT_DIRECTION: "ascending" # ascending（古い順）/ descending（新しい順）
  UPDATE_PROPERTY: "完了日"
  UPDATE_VALUE: "LAST_COMMIT_DATE"
  # 第2プロパティ（不要なら空。UPDATE_VALUE_2に"TODAY"と入れると今日の日付になる）
  UPDATE_PROPERTY_2: ""
  UPDATE_VALUE_2: ""

  # createモード用
  CREATE_PROJECT_NAME: ""
  CREATE_STATUS: "進行中"
  # =============================================

jobs:
  fix-notion-data:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install requests -q

      - name: Fix Notion data
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PROJECT_DB_ID: ${{ secrets.NOTION_PROJECT_DB_ID }}
        run: |
          python3 << 'PYEOF'
          import os
          import requests

          # push経由の場合はconfirmスキップ、workflow_dispatch経由は"execute"必須
          if "${{ github.event_name }}" == "workflow_dispatch" and "${{ inputs.confirm }}" != "execute":
              print("確認コードが正しくありません。\"execute\"と入力してください。")
              exit(1)

          NOTION_API_KEY = os.environ["NOTION_API_KEY"]
          MODE = os.environ["MODE"]
          DATABASE = os.environ["DATABASE"]
          db_id = os.environ["NOTION_PROJECT_DB_ID"] if DATABASE == "project" else os.environ["NOTION_DATABASE_ID"]

          headers = {
              "Authorization": f"Bearer {NOTION_API_KEY}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }

          if MODE == "create":
              project_name = os.environ["CREATE_PROJECT_NAME"]
              status = os.environ["CREATE_STATUS"]

              if not project_name:
                  print("CREATE_PROJECT_NAMEが未設定です")
                  exit(1)

              res = requests.post(
                  "https://api.notion.com/v1/pages",
                  headers=headers,
                  json={
                      "parent": {"database_id": db_id},
                      "properties": {
                          "プロジェクト名": {"title": [{"text": {"content": project_name}}]},
                          "ステータス": {"status": {"name": status}}
                      }
                  }
              )
              if res.status_code == 200:
                  print(f"作成完了: {project_name}（ステータス: {status}）")
              else:
                  print(f"作成失敗: {res.text}")
                  exit(1)

          elif MODE == "update":
              FILTER_PROPERTY = os.environ["FILTER_PROPERTY"]
              FILTER_VALUE = os.environ["FILTER_VALUE"]
              FILTER_TYPE = os.environ.get("FILTER_TYPE", "rich_text")
              DATE_PROPERTY = os.environ.get("DATE_PROPERTY", "")
              DATE_AFTER = os.environ.get("DATE_AFTER", "")
              DATE_BEFORE = os.environ.get("DATE_BEFORE", "")
              LIMIT = os.environ.get("LIMIT", "")
              SORT_DIRECTION = os.environ.get("SORT_DIRECTION", "ascending")
              UPDATE_PROPERTY = os.environ["UPDATE_PROPERTY"]
              UPDATE_VALUE = os.environ["UPDATE_VALUE"]
              UPDATE_PROPERTY_2 = os.environ.get("UPDATE_PROPERTY_2", "")
              UPDATE_VALUE_2 = os.environ.get("UPDATE_VALUE_2", "")
              from datetime import date
              if UPDATE_VALUE_2 == "TODAY":
                  UPDATE_VALUE_2 = date.today().isoformat()

              # フィルター構築
              if FILTER_TYPE == "select":
                  main_filter = {"property": FILTER_PROPERTY, "select": {"equals": FILTER_VALUE}}
              elif FILTER_TYPE == "status":
                  main_filter = {"property": FILTER_PROPERTY, "status": {"equals": FILTER_VALUE}}
              else:
                  main_filter = {"property": FILTER_PROPERTY, "rich_text": {"contains": FILTER_VALUE}}

              filters = [main_filter]
              if DATE_PROPERTY and DATE_AFTER:
                  filters.append({"property": DATE_PROPERTY, "date": {"on_or_after": DATE_AFTER}})
              if DATE_PROPERTY and DATE_BEFORE:
                  filters.append({"property": DATE_PROPERTY, "date": {"on_or_before": DATE_BEFORE}})

              final_filter = {"and": filters} if len(filters) > 1 else filters[0]

              pages = []
              cursor = None
              while True:
                  body = {
                      "filter": final_filter,
                      "page_size": 100
                  }
                  if DATE_PROPERTY:
                      body["sorts"] = [{"property": DATE_PROPERTY, "direction": SORT_DIRECTION}]
                  if cursor:
                      body["start_cursor"] = cursor
                  res = requests.post(f"https://api.notion.com/v1/databases/{db_id}/query", headers=headers, json=body)
                  data = res.json()
                  pages.extend(data.get("results", []))
                  if not data.get("has_more"):
                      break
                  cursor = data.get("next_cursor")

              if LIMIT:
                  pages = pages[:int(LIMIT)]

              print(f"{len(pages)}件対象")

              updated = 0
              for page in pages:
                  page_id = page["id"]
                  prop = page["properties"].get(UPDATE_PROPERTY, {})
                  prop_type = prop.get("type")

                  # 動的な特殊値の処理
                  actual_value = UPDATE_VALUE
                  if UPDATE_VALUE == "LAST_EDITED_TIME":
                      existing = page["properties"].get(UPDATE_PROPERTY, {})
                      if existing.get("date") and existing["date"].get("start"):
                          continue
                      actual_value = page.get("last_edited_time", "")
                  elif UPDATE_VALUE == "LAST_COMMIT_DATE":
                      # プロジェクト名を取得してcommit DBの最終コミット日時を使用
                      pname = ""
                      for key, val in page["properties"].items():
                          if val.get("type") == "title" and val.get("title"):
                              pname = "".join([t["text"]["content"] for t in val["title"] if "text" in t])
                              break
                      commit_res = requests.post(
                          f"https://api.notion.com/v1/databases/{os.environ['NOTION_DATABASE_ID']}/query",
                          headers=headers,
                          json={
                              "filter": {"property": "プロジェクト", "rich_text": {"contains": pname[:50]}},
                              "sorts": [{"property": "作成日", "direction": "descending"}],
                              "page_size": 1
                          }
                      )
                      commits = commit_res.json().get("results", [])
                      if not commits:
                          print(f"コミットなし: {pname}")
                          continue
                      actual_value = commits[0]["properties"].get("作成日", {}).get("date", {}).get("start", "")
                      print(f"最終コミット日時: {actual_value}（{pname}）")

                  if actual_value == "CLEAR":
                      update_body = {UPDATE_PROPERTY: {"date": None} if prop_type == "date" else {prop_type: None}}
                  elif prop_type == "title":
                      update_body = {UPDATE_PROPERTY: {"title": [{"text": {"content": actual_value}}]}}
                  elif prop_type == "rich_text":
                      update_body = {UPDATE_PROPERTY: {"rich_text": [{"text": {"content": actual_value}}]}}
                  elif prop_type == "select":
                      update_body = {UPDATE_PROPERTY: {"select": {"name": actual_value}}}
                  elif prop_type == "status":
                      update_body = {UPDATE_PROPERTY: {"status": {"name": actual_value}}}
                  elif prop_type == "date":
                      update_body = {UPDATE_PROPERTY: {"date": {"start": actual_value}}}
                  elif prop_type == "url":
                      update_body = {UPDATE_PROPERTY: {"url": actual_value}}
                  else:
                      print(f"未対応のプロパティタイプ: {prop_type}（page_id: {page_id}）")
                      continue

                  if UPDATE_PROPERTY_2 and UPDATE_VALUE_2:
                      prop2 = page["properties"].get(UPDATE_PROPERTY_2, {})
                      prop2_type = prop2.get("type")
                      if prop2_type == "date":
                          update_body[UPDATE_PROPERTY_2] = {"date": {"start": UPDATE_VALUE_2}}
                      elif prop2_type == "status":
                          update_body[UPDATE_PROPERTY_2] = {"status": {"name": UPDATE_VALUE_2}}
                      elif prop2_type == "select":
                          update_body[UPDATE_PROPERTY_2] = {"select": {"name": UPDATE_VALUE_2}}
                      elif prop2_type == "rich_text":
                          update_body[UPDATE_PROPERTY_2] = {"rich_text": [{"text": {"content": UPDATE_VALUE_2}}]}
                      elif prop2_type == "url":
                          update_body[UPDATE_PROPERTY_2] = {"url": UPDATE_VALUE_2}

                  r = requests.patch(
                      f"https://api.notion.com/v1/pages/{page_id}",
                      headers=headers,
                      json={"properties": update_body}
                  )
                  if r.status_code == 200:
                      updated += 1
                      print(f"更新完了: {page_id}")
                  else:
                      print(f"更新失敗: {r.text}")

              print(f"{updated}件更新完了")

          PYEOF
