name: Fix Notion Data

# Claudeが変数を書き換えてpushした後、手動でRun workflowを実行する
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '【実行内容】MODE=update / DATABASE=commit_log / FILTER=プロジェクト:"NotionからGemini記事生成→Zenn自動投稿パイプライン" / UPDATE=プロジェクト:"GitHubのコードをpushすると毎日22時にZennへ自動投稿されるシステム" ／ 確認できたら"execute"と入力'
        required: true
        type: string

env:
  # ========== ここをClaudeが書き換える ==========
  MODE: "update"           # update / create
  DATABASE: "commit_log"   # commit_log / project

  # updateモード用
  FILTER_PROPERTY: "プロジェクト"
  FILTER_VALUE: "NotionからGemini記事生成→Zenn自動投稿パイプライン"
  UPDATE_PROPERTY: "プロジェクト"
  UPDATE_VALUE: "GitHubのコードをpushすると毎日22時にZennへ自動投稿されるシステム"

  # createモード用
  CREATE_PROJECT_NAME: ""
  CREATE_STATUS: "未着手"
  # =============================================

jobs:
  fix-notion-data:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install requests -q

      - name: Fix Notion data
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PROJECT_DB_ID: ${{ secrets.NOTION_PROJECT_DB_ID }}
        run: |
          python3 << 'PYEOF'
          import os
          import requests

          if "${{ inputs.confirm }}" != "execute":
              print("確認コードが正しくありません。\"execute\"と入力してください。")
              exit(1)

          NOTION_API_KEY = os.environ["NOTION_API_KEY"]
          MODE = os.environ["MODE"]
          DATABASE = os.environ["DATABASE"]
          db_id = os.environ["NOTION_PROJECT_DB_ID"] if DATABASE == "project" else os.environ["NOTION_DATABASE_ID"]

          headers = {
              "Authorization": f"Bearer {NOTION_API_KEY}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }

          if MODE == "create":
              project_name = os.environ["CREATE_PROJECT_NAME"]
              status = os.environ["CREATE_STATUS"]

              if not project_name:
                  print("CREATE_PROJECT_NAMEが未設定です")
                  exit(1)

              res = requests.post(
                  "https://api.notion.com/v1/pages",
                  headers=headers,
                  json={
                      "parent": {"database_id": db_id},
                      "properties": {
                          "プロジェクト名": {"title": [{"text": {"content": project_name}}]},
                          "ステータス": {"status": {"name": status}}
                      }
                  }
              )
              if res.status_code == 200:
                  print(f"作成完了: {project_name}（ステータス: {status}）")
              else:
                  print(f"作成失敗: {res.text}")
                  exit(1)

          elif MODE == "update":
              FILTER_PROPERTY = os.environ["FILTER_PROPERTY"]
              FILTER_VALUE = os.environ["FILTER_VALUE"]
              UPDATE_PROPERTY = os.environ["UPDATE_PROPERTY"]
              UPDATE_VALUE = os.environ["UPDATE_VALUE"]

              pages = []
              cursor = None
              while True:
                  body = {
                      "filter": {"property": FILTER_PROPERTY, "rich_text": {"contains": FILTER_VALUE}},
                      "page_size": 100
                  }
                  if cursor:
                      body["start_cursor"] = cursor
                  res = requests.post(f"https://api.notion.com/v1/databases/{db_id}/query", headers=headers, json=body)
                  data = res.json()
                  pages.extend(data.get("results", []))
                  if not data.get("has_more"):
                      break
                  cursor = data.get("next_cursor")

              print(f"{len(pages)}件ヒット")

              updated = 0
              for page in pages:
                  page_id = page["id"]
                  prop = page["properties"].get(UPDATE_PROPERTY, {})
                  prop_type = prop.get("type")

                  if prop_type == "title":
                      update_body = {UPDATE_PROPERTY: {"title": [{"text": {"content": UPDATE_VALUE}}]}}
                  elif prop_type == "rich_text":
                      update_body = {UPDATE_PROPERTY: {"rich_text": [{"text": {"content": UPDATE_VALUE}}]}}
                  elif prop_type == "select":
                      update_body = {UPDATE_PROPERTY: {"select": {"name": UPDATE_VALUE}}}
                  elif prop_type == "status":
                      update_body = {UPDATE_PROPERTY: {"status": {"name": UPDATE_VALUE}}}
                  elif prop_type == "url":
                      update_body = {UPDATE_PROPERTY: {"url": UPDATE_VALUE}}
                  else:
                      print(f"未対応のプロパティタイプ: {prop_type}（page_id: {page_id}）")
                      continue

                  r = requests.patch(
                      f"https://api.notion.com/v1/pages/{page_id}",
                      headers=headers,
                      json={"properties": update_body}
                  )
                  if r.status_code == 200:
                      updated += 1
                  else:
                      print(f"更新失敗: {r.text}")

              print(f"{updated}件更新完了")

          PYEOF
